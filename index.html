<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GlobalProtect Mock</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="gp-container">
    <div class="gp-header">
      <span class="gp-title">GlobalProtect</span>
      <button class="gp-settings" aria-label="Settings">
        <i class="fas fa-cog"></i>
      </button>
    </div>

    <div class="gp-logo">
      <i class="fas fa-globe-americas globe"></i>
      <span class="shield"><i class="fas fa-check"></i></span>
    </div>

    <h2 class="gp-welcome">Welcome to GlobalProtect</h2>
    <p class="gp-subtitle">Please enter your portal address</p>

    <input class="gp-input" type="text" value="vpngiris.marmara.edu.tr" placeholder="Portal address" />

    <button class="gp-connect">Connect</button>
  </div>
</body>
</html>
